<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Customer Tracker{% endblock %}</title>
    <meta name="description" content="Structured Finance Customer Tracking System">
    <!-- MUST be first: apply saved theme before any render to prevent flash -->
    <script>
        (function() {
            // Default is dark. Only switch to light if explicitly saved.
            if (localStorage.getItem('theme') === 'light') {
                document.documentElement.classList.remove('dark');
            } else {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50:  '#eef6ff',
                            100: '#d9eaff',
                            200: '#bcdbff',
                            300: '#8ec5ff',
                            400: '#59a4ff',
                            500: '#3381fc',
                            600: '#1d62f1',
                            700: '#154dde',
                            800: '#1840b4',
                            900: '#19398e',
                            950: '#142456',
                        }
                    }
                }
            }
        }
        
        function toggleTheme() {
            const isDark = document.documentElement.classList.contains('dark');
            if (isDark) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
            // Update icon state
            var darkIcon  = document.getElementById('theme-toggle-dark-icon');
            var lightIcon = document.getElementById('theme-toggle-light-icon');
            if (darkIcon && lightIcon) {
                darkIcon.classList.toggle('hidden', !isDark);
                lightIcon.classList.toggle('hidden', isDark);
            }
            window.dispatchEvent(new Event('themeChanged'));
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-gray-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 font-sans min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-lg border-b border-gray-200 dark:border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2 text-lg font-bold tracking-tight text-gray-900 dark:text-white">
                    <span class="bg-brand-600 rounded-lg p-1.5">
                        <svg class="w-5 h-5 text-gray-900 dark:text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 7h4l3-4h4l3 4h4v13H3V7z"/>
                        </svg>
                    </span>
                    Customer Tracker
                </a>
                <div class="flex items-center gap-1">
                    <a href="/dashboard"   id="nav-dashboard"   class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 hover:bg-brand-600/20 hover:text-brand-600 dark:text-brand-400 {% if request.path == '/dashboard' %}bg-brand-600/20 text-brand-600 dark:text-brand-400{% else %}text-gray-400{% endif %}">{{ lang_dict.get('nav_dashboard', 'Dashboard') }}</a>
                    <a href="/list"        id="nav-list"        class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 hover:bg-brand-600/20 hover:text-brand-600 dark:text-brand-400 {% if request.path == '/list' %}bg-brand-600/20 text-brand-600 dark:text-brand-400{% else %}text-gray-400{% endif %}">{{ lang_dict.get('nav_deals', 'Deals') }}</a>
                    <a href="/overview"    id="nav-overview"    class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 hover:bg-brand-600/20 hover:text-brand-600 dark:text-brand-400 {% if '/overview' in request.path %}bg-brand-600/20 text-brand-600 dark:text-brand-400{% else %}text-gray-400{% endif %}">{{ lang_dict.get('nav_overview', 'Overview') }}</a>
                    <a href="/management"  id="nav-management"  class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 hover:bg-brand-600/20 hover:text-brand-600 dark:text-brand-400 {% if '/management' in request.path %}bg-brand-600/20 text-brand-600 dark:text-brand-400{% else %}text-gray-400{% endif %}">{{ lang_dict.get('nav_management', 'Management') }}</a>
                    
                    <!-- Language Toggle -->
                    <div class="ml-4 flex items-center bg-gray-100 dark:bg-gray-800 rounded-lg p-1 border border-gray-200 dark:border-gray-700">
                        <a href="/set_language/0" class="px-2.5 py-1 text-xs font-semibold rounded-md transition-all {{ 'bg-brand-600 text-white shadow-md' if current_lang == 0 else 'text-gray-700 dark:text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-white' }}">EN</a>
                        <a href="/set_language/1" class="px-2.5 py-1 text-xs font-semibold rounded-md transition-all {{ 'bg-brand-600 text-white shadow-md' if current_lang == 1 else 'text-gray-700 dark:text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 hover:text-gray-900 dark:hover:text-white' }}">TR</a>
                    </div>
                    
                    <!-- Theme Toggle -->
                    <button id="theme-toggle" type="button" class="ml-4 flex items-center justify-center p-1.5 rounded-lg bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-500 dark:text-gray-400 hover:bg-gray-200 dark:hover:bg-gray-700 transition-all duration-200" title="Toggle Theme">
                        <svg id="theme-toggle-dark-icon" class="hidden w-4 h-4" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
                        <svg id="theme-toggle-light-icon" class="hidden w-4 h-4" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
                    </button>
                    <script>
                        (function() {
                            var darkIcon  = document.getElementById('theme-toggle-dark-icon');
                            var lightIcon = document.getElementById('theme-toggle-light-icon');
                            if (localStorage.getItem('theme') === 'light') {
                                if (darkIcon)  darkIcon.classList.remove('hidden');
                                if (lightIcon) lightIcon.classList.add('hidden');
                            } else {
                                if (lightIcon) lightIcon.classList.remove('hidden');
                                if (darkIcon)  darkIcon.classList.add('hidden');
                            }
                        })();
                    </script>

                    <!-- Disconnect / Change Environment -->
                    <a href="/disconnect" class="ml-4 flex items-center justify-center p-1.5 rounded-lg bg-gray-100 dark:bg-gray-800 border border-gray-300 dark:border-gray-700 text-gray-700 dark:text-gray-400 dark:text-gray-400 hover:bg-red-500/10 hover:text-red-600 dark:text-red-400 hover:border-red-500/30 transition-all duration-200" title="Change Environment / Disconnect">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t bg-white border-gray-200 dark:bg-gray-950 dark:border-gray-800 py-4 text-center text-xs text-gray-700 dark:text-gray-500 dark:text-gray-600">
        &copy; 2026 Structured Finance &mdash; Customer Tracker MVP
    </footer>

    <script>
        // Bind toggle button click to unified toggleTheme function
        document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    </script>
</body>
</html>
