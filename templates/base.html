<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Customer Tracker{% endblock %}</title>
    <meta name="description" content="Structured Finance Customer Tracking System">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50:  '#eef6ff',
                            100: '#d9eaff',
                            200: '#bcdbff',
                            300: '#8ec5ff',
                            400: '#59a4ff',
                            500: '#3381fc',
                            600: '#1d62f1',
                            700: '#154dde',
                            800: '#1840b4',
                            900: '#19398e',
                            950: '#142456',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen flex flex-col">
    <!-- Navbar -->
    <nav class="bg-gray-900/80 backdrop-blur-lg border-b border-gray-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2 text-lg font-bold tracking-tight text-white">
                    <span class="bg-brand-600 rounded-lg p-1.5">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M3 7h4l3-4h4l3 4h4v13H3V7z"/>
                        </svg>
                    </span>
                    Customer Tracker
                </a>
                <div class="flex gap-1">
                    <a href="/dashboard"   id="nav-dashboard"   class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 hover:bg-brand-600/20 hover:text-brand-400 {% if request.path == '/dashboard' %}bg-brand-600/20 text-brand-400{% else %}text-gray-400{% endif %}">Dashboard</a>
                    <a href="/list"        id="nav-list"        class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 hover:bg-brand-600/20 hover:text-brand-400 {% if request.path == '/list' %}bg-brand-600/20 text-brand-400{% else %}text-gray-400{% endif %}">Customers</a>
                    <a href="/management"  id="nav-management"  class="nav-link px-4 py-2 rounded-lg text-sm font-medium transition-all duration-200 hover:bg-brand-600/20 hover:text-brand-400 {% if '/management' in request.path %}bg-brand-600/20 text-brand-400{% else %}text-gray-400{% endif %}">Management</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-800 py-4 text-center text-xs text-gray-600">
        &copy; 2026 Structured Finance &mdash; Customer Tracker MVP
    </footer>
</body>
</html>
